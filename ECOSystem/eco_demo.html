<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Demetria Spirit — ECO Demo (50 Stages)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1621;--bg2:#151f2e;--card:#1a2535;--card2:#1f2d40;
  --border:#273a52;--text:#dde8f5;--dim:#6a85a0;
  --gold:#f5c842;--green:#56c45a;--red:#e05050;--purple:#a060e0;
  --r:12px;
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap}
.day-badge{background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;font-size:12px}
.day-badge b{color:var(--gold);font-size:15px}
.clock-wrap{flex:1;min-width:160px;max-width:340px}
.clock-track{height:20px;border-radius:10px;overflow:hidden;background:linear-gradient(to right,#0a0a20 0%,#1a1a60 10%,#4488cc 25%,#88ccff 38%,#ffe080 50%,#ff9940 70%,#aa3322 82%,#1a1a60 90%,#0a0a20 100%);border:1px solid var(--border);position:relative}
.clock-knob{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:14px;pointer-events:none;filter:drop-shadow(0 0 4px rgba(255,255,255,0.8));transition:left .15s linear}
.clock-label{text-align:center;font-size:10px;color:var(--dim);margin-top:2px}
.speed-row{display:flex;gap:3px}
.spd{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:3px 9px;border-radius:7px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
/* .spd:hover removed */
.spd.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:700}

/* NIGHT */
#nightVeil{position:fixed;inset:0;pointer-events:none;z-index:80;transition:background 1.2s ease}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:200;text-align:center;border:1px solid;max-width:300px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:12px 16px}

/* PANEL */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px}
.panel-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}

/* INVENTORY */
.inv-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:90px;overflow-y:auto}
.chip{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:3px 9px;font-size:12px;transition:all .2s}
.chip.nz{background:#1a2e1a;border-color:#2d5a2d}
.chip .qty{color:var(--gold);font-weight:700;min-width:12px;text-align:right}

/* FILTER */
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-info{font-size:11px;color:var(--dim);margin-left:auto}
.ftab{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
/* .ftab:hover removed */
.ftab.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:700}

/* STAGES */
.stages{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:12px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.5)}
.card.locked{opacity:.6}
.card.rdy{border-color:var(--gold);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,200,66,.25)}50%{box-shadow:0 0 18px rgba(245,200,66,.55)}}

.card-head{padding:9px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.card-emoji{font-size:24px;width:32px;text-align:center}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:4px;margin-top:2px}

.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;border:1px solid}
.badge-grow{background:#112211;color:#56c45a;border-color:#224422}
.badge-craft{background:#190d2e;color:var(--purple);border-color:#3a1a6e}
.badge-lock{background:#1c1c1c;color:#555;border-color:#333}
.wave-tag{font-size:9px;color:var(--dim);background:var(--bg2);border:1px solid var(--border);padding:1px 5px;border-radius:6px}

.card-body{padding:10px 12px}

/* items */
.item-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.item-tag{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dim);background:var(--bg2);padding:2px 7px;border-radius:6px}

/* progress */
.prog-wrap{margin-bottom:8px}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:3px}
.prog-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(to right,#2a5c2a,var(--green));transition:width .4s ease}
.prog-fill.gold{background:linear-gradient(to right,#7a5800,var(--gold))}

/* cost */
.cost-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;margin-bottom:8px}
.cost-title{font-size:10px;color:var(--dim);margin-bottom:4px}
.cost-tags{display:flex;flex-wrap:wrap;gap:3px}
.ct{font-size:10px;padding:2px 6px;border-radius:5px;border:1px solid}
.ct.ok{background:#112211;border-color:#2a5a2a;color:var(--green)}
.ct.bad{background:#221111;border-color:#5a2a2a;color:var(--red)}

/* recipes */
.recipes{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.rrow{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:5px 7px}
.r-ico{font-size:16px;min-width:20px;text-align:center}
.r-name{font-size:11px;font-weight:600;min-width:72px}
.r-ings{display:flex;flex-wrap:wrap;gap:2px;flex:1}
.ri{font-size:10px;padding:1px 4px;border-radius:4px;border:1px solid}
.ri.ok{background:#112211;border-color:#2a5a2a;color:var(--green)}
.ri.bad{background:#221111;border-color:#5a2a2a;color:var(--red)}

/* buttons */
.btn{width:100%;padding:7px;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-plant{background:#2d6e30;color:#c8f0c8}
/* .btn-plant:hover removed */
.btn-wait{background:var(--bg2);color:var(--dim);border:1px solid var(--border);cursor:default}
.btn-harvest{background:var(--gold);color:#1a0e00}
/* .btn-harvest:hover removed */
.btn-unlock{background:linear-gradient(135deg,#2d1a5c,#5c3aaa);color:#e0d0ff;border:1px solid #7050c0}
/* .btn-unlock:hover removed */
.btn-unlock:disabled{opacity:.35;cursor:not-allowed}
.btn-craft{background:#4a1a80;color:#d0a0ff;border:none;padding:4px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
/* .btn-craft:hover removed */
.btn-craft:disabled{opacity:.3;cursor:not-allowed}

/* LOG */
.log-list{display:flex;flex-direction:column;gap:2px;max-height:110px;overflow-y:auto}
.log-row{display:flex;gap:6px;font-size:11px;padding:2px 0;border-bottom:1px solid var(--border)}
.log-day{color:var(--gold);font-weight:700;min-width:42px}
.log-row.t-harvest .log-msg{color:var(--green)}
.log-row.t-unlock .log-msg{color:var(--purple)}
.log-row.t-craft .log-msg{color:#c080ff}
.log-row.t-day .log-msg{color:var(--dim);font-style:italic}
.log-row.t-quest .log-msg{color:#f5c842}

/* MONEY */
.money-chip{background:#1f1a00;border:1px solid #4a3a00;padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--gold)}

/* QUEST */
.quest-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px}
.quest-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.quest-count{font-size:11px;color:var(--dim);background:var(--bg2);border:1px solid var(--border);padding:2px 8px;border-radius:10px}
.quest-empty{font-size:12px;color:var(--dim);text-align:center;padding:12px 0}
.quest-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:6px}
.qcard.new{border-color:var(--gold);box-shadow:0 0 10px rgba(245,200,66,.2)}
.q-npc{display:flex;align-items:center;gap:6px}
.q-npc-ico{font-size:18px}
.q-npc-name{font-size:12px;font-weight:700;flex:1}
.q-reward{font-size:12px;font-weight:700;color:var(--gold)}
.q-req{display:flex;flex-wrap:wrap;gap:3px}
.qr{font-size:11px;padding:2px 6px;border-radius:5px;border:1px solid}
.qr.ok{background:#112211;border-color:#2a5a2a;color:var(--green)}
.qr.bad{background:#221111;border-color:#5a2a2a;color:var(--red)}
.btn-submit{width:100%;padding:6px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;background:linear-gradient(135deg,#7a5800,var(--gold));color:#111}
/* .btn-submit:hover removed */
.btn-submit:disabled{opacity:.3;cursor:not-allowed;background:var(--card2);color:var(--dim)}
.quest-next{font-size:10px;color:var(--dim);text-align:right;margin-top:4px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="nightVeil"></div>
<div id="toast"></div>

<header>
  <div class="logo">🌸 Demetria ECO Demo <span style="font-size:10px;font-weight:400;color:var(--dim);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1px 7px;margin-left:4px;vertical-align:middle">v0.6.1</span></div>
  <div class="day-badge">วันที่ <b id="hDay">1</b><span id="hPhase" style="color:var(--dim);font-size:11px;margin-left:4px">เช้า</span></div>
  <div class="money-chip">💰 <span id="hMoney">0</span></div>
  <div class="clock-wrap">
    <div class="clock-track"><div class="clock-knob" id="clockKnob">☀️</div></div>
    <div class="clock-label" id="clockLabel">กลางวัน</div>
  </div>
  <div class="speed-row">
    <button class="spd" onclick="setSpeed(1)">1x</button>
    <button class="spd" onclick="setSpeed(2)">2x</button>
    <button class="spd active" onclick="setSpeed(5)">5x</button>
    <button class="spd" onclick="setSpeed(10)">10x</button>
    <button class="spd" onclick="togglePause()" id="pauseBtn">⏸</button>
    <button class="spd active" onclick="toggleNight()" id="nightBtn" title="เปิด/ปิด แสงกลางวัน-กลางคืน">🌙</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-title">🎒 คลังของ</div>
    <div class="inv-grid" id="invGrid"></div>
  </div>

  <div class="quest-panel">
    <div class="quest-header">
      <div class="panel-title" style="margin-bottom:0">📜 เควสจาก NPC</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="quest-next" id="questNext"></div>
        <div class="quest-count" id="questCount">0 / 20</div>
      </div>
    </div>
    <div class="quest-list" id="questList">
      <div class="quest-empty">ยังไม่มีเควส — ปลดล็อค NPC stage ก่อน แล้วรอสักครู่!</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="ftab active" onclick="setFilter('all')">ทั้งหมด</button>
    <button class="ftab" onclick="setFilter('farm')">🌾 ฟาร์ม</button>
    <button class="ftab" onclick="setFilter('animal')">🐄 สัตว์</button>
    <button class="ftab" onclick="setFilter('forest')">🌲 ป่า</button>
    <button class="ftab" onclick="setFilter('craft')">🏪 ร้านค้า</button>
    <button class="ftab" onclick="setFilter('unlocked')">✅ ปลดล็อคแล้ว</button>
    <span class="filter-info" id="filterInfo"></span>
  </div>

  <div class="stages" id="stagesGrid"></div>

  <div class="panel">
    <div class="panel-title">📋 บันทึก</div>
    <div class="log-list" id="logList"></div>
  </div>
</main>

// ═══════════════════════════════════════════════════════════
//  50 STAGES DEFINITION
// ═══════════════════════════════════════════════════════════

const has = cost => !cost || Object.entries(cost).every(([k,v])=>(G.inv[k]||0)>=v);
const pay = cost => Object.entries(cost).forEach(([k,v])=>G.inv[k]-=v);
const sn  = s => s.name.length>12 ? s.name.slice(0,12)+'…' : s.name;
const prereqMet = s => {
  if(!s.prereq) return true;
  const prev = G.stages.find(x=>x.id===s.prereq);
  return prev && prev.unlocked;
};
const prereqStage = s => s.prereq ? G.stages.find(x=>x.id===s.prereq) : null;

function addLog(msg,type=''){G.log.unshift({day:G.day,msg,type});if(G.log.length>50)G.log.pop()}

//  QUEST SYSTEM
// ═══════════════════════════════════════════════════════════
const QUEST_MAX=20;
const rndInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function getQuestPool(){
  // NPC stages ที่ปลดล็อคแล้ว → เป็นผู้ให้เควส
  const npcs=G.stages.filter(s=>s.type==='craft'&&s.unlocked);
  // วัตถุดิบจาก passive stages ที่ปลดล็อคแล้ว
  const rawItems=[];
  G.stages.forEach(s=>{if(s.type==='passive'&&s.unlocked)(s.produces||[]).forEach(i=>rawItems.push(i))});
  // สร้าง set ของไอเทมที่หาได้จริง (วน loop handle chain crafting)
  const obtainable=new Set(rawItems);
  let changed=true;
  while(changed){
    changed=false;
    G.stages.forEach(s=>{
      if(s.type==='craft'&&s.unlocked)(s.recipes||[]).forEach(r=>{
        if(!obtainable.has(r.name)&&Object.keys(r.ing).every(k=>obtainable.has(k))){
          obtainable.add(r.name);changed=true;
        }
      });
    });
  }
  // เอาเฉพาะของคราฟที่ ingredient ครบจาก stage ที่ปลดล็อคแล้วเท่านั้น
  const craftedItems=[];
  G.stages.forEach(s=>{
    if(s.type==='craft'&&s.unlocked)(s.recipes||[]).forEach(r=>{
      if(obtainable.has(r.name)&&!rawItems.includes(r.name))craftedItems.push(r.name);
    });
  });
  const items=[...new Set([...rawItems,...craftedItems])];
  return{npcs,items,rawItems:[...new Set(rawItems)],craftedItems:[...new Set(craftedItems)]};
}

function generateQuest(){
  if(G.quests.length>=QUEST_MAX)return;
  const{npcs,rawItems,craftedItems}=getQuestPool();
  const allItems=[...rawItems,...craftedItems];
  if(!npcs.length||!allItems.length)return;
  const npc=npcs[rndInt(0,npcs.length-1)];
  const numReq=rndInt(1,Math.min(3,allItems.length));
  const shuffled=[...allItems].sort(()=>Math.random()-.5).slice(0,numReq);
  const craftedSet=new Set(craftedItems);
  // ของคราฟ qty สูงกว่าวัตถุดิบธรรมดา
  const requests=shuffled.map(item=>({
    item,
    qty:craftedSet.has(item)?rndInt(4,12):rndInt(2,6),
    emoji:ITEMS[item]||'?'
  }));
  const reward=requests.reduce((s,r)=>s+r.qty*(craftedSet.has(r.item)?rndInt(15,25):rndInt(8,15)),0);
  G.questIdSeq++;
  G.quests.push({
    id:'q'+G.questIdSeq,
    npcId:npc.id,npcName:npc.name,npcEmoji:npc.emoji,
    requests,reward,isNew:true
  });
  addLog(`📜 เควสใหม่จาก ${npc.emoji} ${npc.name}`,'quest');
  toast(`📜 เควสใหม่! ${npc.emoji} ${npc.name}`,'var(--gold)');
  G.nextQuestIn=rndInt(20,50);
  renderQuests();
}

function submitQuest(id){
  const q=G.quests.find(x=>x.id===id);
  if(!q)return;
  const canDo=q.requests.every(r=>(G.inv[r.item]||0)>=r.qty);
  if(!canDo){toast('❌ ของยังไม่ครบ','var(--red)');return;}
  q.requests.forEach(r=>G.inv[r.item]-=r.qty);
  G.money+=q.reward;
  G.quests=G.quests.filter(x=>x.id!==id);
  toast(`💰 +${q.reward} เหรียญ! จาก ${q.npcEmoji} ${q.npcName}`,'var(--gold)');
  addLog(`ส่งเควส ${q.npcEmoji}${q.npcName} ได้รับ 💰${q.reward}`,'quest');
  // spawn quest ใหม่เร็วขึ้น
  G.nextQuestIn=rndInt(8,18);
  render();
}

function tickQuestTimer(dtSec){
  G.nextQuestIn-=dtSec;
  if(G.nextQuestIn<=0){
    generateQuest();
    if(G.quests.length<QUEST_MAX)G.nextQuestIn=rndInt(20,50);
  }
  // update countdown UI
  const el=document.getElementById('questNext');
  if(el&&G.quests.length<QUEST_MAX&&getQuestPool().npcs.length){
    el.textContent=`เควสถัดไปใน ~${Math.max(1,Math.ceil(G.nextQuestIn))}s`;
  } else if(el){el.textContent='';}
}

let toastT;
function toast(msg,color='var(--green)'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.color=color;el.style.borderColor=color;el.style.background='var(--card2)';
  el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

function plant(id){
  const s=G.stages.find(x=>x.id===id);
  if(!s||!s.unlocked||s.planted||s.ready)return;
  s.planted=true;s.daysGrown=0;
  addLog(`${s.emoji} เริ่มปลูก ${s.name}`);render();
}
function harvest(id){
  const s=G.stages.find(x=>x.id===id);
  if(!s||!s.ready)return;
  const got=[];
  s.produces.forEach(item=>{G.inv[item]+=s.amount;got.push(`${ITEMS[item]}${item}×${s.amount}`)});
  s.ready=false;s.daysGrown=0;
  if(s.autoPlant){s.planted=true;addLog(`🤖 ${s.emoji} ปลูกใหม่อัตโนมัติ`);}
  else{s.planted=false;}
  toast('🌟 '+got.join(' '),'var(--gold)');
  addLog(`เก็บเกี่ยว ${got.join(' ')} จาก ${s.emoji}`,'harvest');render();
}
function toggleAutoPlant(id){
  const s=G.stages.find(x=>x.id===id);
  if(!s)return;
  s.autoPlant=!s.autoPlant;
  // ถ้าเปิด auto แล้วยังไม่ได้ปลูก → ปลูกทันที
  if(s.autoPlant&&!s.planted&&!s.ready){s.planted=true;s.daysGrown=0;addLog(`🤖 ${s.emoji} เริ่มปลูกอัตโนมัติ`);}
  render();
}
function craft(id,idx){
  const s=G.stages.find(x=>x.id===id);
  if(!s||!s.unlocked)return;
  const r=s.recipes[idx];if(!has(r.ing))return;
  pay(r.ing);G.inv[r.name]=(G.inv[r.name]||0)+1;
  toast(`✨ ${r.emoji} ${r.name} สำเร็จ!`,'var(--purple)');
  addLog(`คราฟ ${r.emoji}${r.name}`,'craft');render();
}
function unlock(id){
  const s=G.stages.find(x=>x.id===id);
  if(!s||s.unlocked)return;
  if(!prereqMet(s)){
    const prev=prereqStage(s);
    toast(`🔒 ต้องปลดล็อค "${prev?.name}" ก่อน!`,'var(--red)');return;
  }
  if(s.moneyCost&&G.money<s.moneyCost){toast(`❌ เงินไม่พอ ต้องการ 💰${s.moneyCost}`,'var(--red)');return;}
  if(!has(s.unlockCost)){toast('❌ ของยังไม่พอ','var(--red)');return;}
  pay(s.unlockCost);
  if(s.moneyCost) G.money-=s.moneyCost;
  s.unlocked=true;
  toast(`🎉 ปลดล็อค ${s.emoji} ${s.name}! ใช้ไป 💰${s.moneyCost||0}`,'var(--purple)');
  addLog(`ปลดล็อค ${s.emoji} ${s.name} (💰-${s.moneyCost||0})`,'unlock');render();
}
function setFilter(f){
  G.filter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes(`'${f}'`)));
  render();
}

function newDay(){
  G.day++;addLog(`── วันที่ ${G.day} ──`,'day');
  G.stages.forEach(s=>{
    if(s.type!=='passive'||!s.unlocked||!s.planted||s.ready)return;
    s.daysGrown++;
    if(s.daysGrown>=s.growDays){
      s.ready=true;
      addLog(`${s.emoji} ${s.name} พร้อมเก็บ!`,'harvest');
      toast(`🌟 ${s.name} พร้อมเก็บ!`,'var(--green)');
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  TIME LOOP
// ═══════════════════════════════════════════════════════════
const DAY_MS=60000;
const PHASE=t=>{
  if(t<8)  return{label:'รุ่งอรุณ',icon:'🌅',night:.35};
  if(t<28) return{label:'เช้า',    icon:'🌤️',night:0};
  if(t<62) return{label:'กลางวัน', icon:'☀️', night:0};
  if(t<75) return{label:'บ่าย',    icon:'🌤️',night:0};
  if(t<84) return{label:'เย็น',    icon:'🌆',night:.12};
  if(t<93) return{label:'ค่ำ',     icon:'🌙',night:.42};
  return          {label:'กลางคืน',icon:'⭐', night:.62};
};
function setSpeed(s){G.speed=s;document.querySelectorAll('.spd').forEach(b=>b.classList.toggle('active',b.textContent===s+'x'))}
function togglePause(){G.paused=!G.paused;document.getElementById('pauseBtn').textContent=G.paused?'▶️':'⏸';if(!G.paused)lastTs=null}
function toggleNight(){G.nightEffect=!G.nightEffect;const btn=document.getElementById('nightBtn');btn.classList.toggle('active',G.nightEffect);btn.textContent=G.nightEffect?'🌙':'☀️';if(!G.nightEffect){const vl=document.getElementById('nightVeil');if(vl)vl.style.background='rgba(0,0,0,0)'}}

let lastTs=null,lastRender=0;
function loop(ts){
  if(!lastTs)lastTs=ts;
  const dt=ts-lastTs;lastTs=ts;
  if(!G.paused){
    const dtSec=dt/1000;
    G.time+=(dt/DAY_MS)*G.speed*100;
    if(G.time>=100){G.time-=100;newDay()}
    const p=PHASE(G.time);
    const kn=document.getElementById('clockKnob');
    if(kn){kn.textContent=p.icon;kn.style.left=G.time+'%'}
    const cl=document.getElementById('clockLabel');if(cl)cl.textContent=p.label;
    const hp=document.getElementById('hPhase');if(hp)hp.textContent=p.label;
    const hd=document.getElementById('hDay');if(hd)hd.textContent=G.day;
    const hm=document.getElementById('hMoney');if(hm)hm.textContent=G.money;
    const vl=document.getElementById('nightVeil');if(vl)vl.style.background=G.nightEffect?`rgba(0,0,20,${p.night})`:'rgba(0,0,0,0)';
    tickQuestTimer(dtSec);
    if(ts-lastRender>300){render();lastRender=ts}
  }
  requestAnimationFrame(loop);
}

function render(){renderInv();renderQuests();renderStages();renderLog()}

function renderQuests(){
  const el=document.getElementById('questList');if(!el)return;
  const cnt=document.getElementById('questCount');
  if(cnt)cnt.textContent=`${G.quests.length} / ${QUEST_MAX}`;
  if(!G.quests.length){
    const{npcs}=getQuestPool();
    el.innerHTML=`<div class="quest-empty">${npcs.length?'รอเควสใหม่...':'ปลดล็อค NPC stage ก่อน แล้วรอสักครู่!'}</div>`;
    return;
  }
  el.innerHTML=G.quests.map(q=>{
    const canDo=q.requests.every(r=>(G.inv[r.item]||0)>=r.qty);
    const reqs=q.requests.map(r=>{
      const have=(G.inv[r.item]||0);
      const ok=have>=r.qty;
      return`<span class="qr ${ok?'ok':'bad'}">${r.emoji} ${r.item} ${have}/${r.qty}</span>`;
    }).join('');
    const isNew=q.isNew;
    if(isNew)setTimeout(()=>{q.isNew=false},2000);
    return`<div class="qcard${isNew?' new':''}">
      <div class="q-npc">
        <span class="q-npc-ico">${q.npcEmoji}</span>
        <span class="q-npc-name">${q.npcName}</span>
        <span class="q-reward">💰 ${q.reward}</span>
      </div>
      <div class="q-req">${reqs}</div>
      <button class="btn-submit" ${canDo?'':'disabled'} onclick="submitQuest('${q.id}')">
        ${canDo?'✅ ส่งของ':'⏳ ของยังไม่ครบ'}
      </button>
    </div>`;
  }).join('');
}

function renderInv(){
  const known=new Set();
  G.stages.forEach(s=>{
    if(!s.unlocked)return;
    (s.produces||[]).forEach(i=>known.add(i));
    (s.recipes||[]).forEach(r=>known.add(r.name));
  });
  const el=document.getElementById('invGrid');if(!el)return;
  if(!known.size){el.innerHTML='<span style="color:var(--dim)">กด 🌱 เริ่มปลูก ที่ฟาร์ม A!</span>';return}
  el.innerHTML=[...known].map(item=>{
    const n=G.inv[item]||0;
    return`<div class="chip${n>0?' nz':''}">${ITEMS[item]||'?'} ${item} <span class="qty">${n}</span></div>`
  }).join('');
}

function renderStages(){
  const el=document.getElementById('stagesGrid');if(!el)return;
  let filtered=G.stages;
  if(G.filter==='farm')    filtered=G.stages.filter(s=>s.cat==='farm');
  else if(G.filter==='animal') filtered=G.stages.filter(s=>s.cat==='animal');
  else if(G.filter==='forest') filtered=G.stages.filter(s=>s.cat==='forest');
  else if(G.filter==='craft')  filtered=G.stages.filter(s=>s.cat==='craft');
  else if(G.filter==='unlocked') filtered=G.stages.filter(s=>s.unlocked);
  const fi=document.getElementById('filterInfo');
  if(fi){
    const unlocked=G.stages.filter(s=>s.unlocked).length;
    fi.textContent=`${filtered.length} ด่าน | ปลดล็อคแล้ว ${unlocked}/50`;
  }
  el.innerHTML=filtered.map(cardHTML).join('');
}

function costHTML(cost,moneyCost){
  const mTag=moneyCost?`<span class="ct ${G.money>=moneyCost?'ok':'bad'}">💰 เหรียญ ${G.money}/${moneyCost}</span>`:'';
  const iTags=cost?Object.entries(cost).map(([k,v])=>{
    const have=(G.inv[k]||0)>=v;
    return`<span class="ct ${have?'ok':'bad'}">${ITEMS[k]||''} ${k} ${G.inv[k]||0}/${v}</span>`;
  }).join(''):'';
  if(!mTag&&!iTags)return'';
  return`<div class="cost-box"><div class="cost-title">ต้องการ:</div><div class="cost-tags">${mTag}${iTags}</div></div>`;
}

function cardHTML(s){
  const isRdy=s.type==='passive'&&s.ready;
  let cls='card';
  if(!s.unlocked)cls+=' locked';
  if(isRdy)cls+=' rdy';
  const bdgType=!s.unlocked?'lock':s.type==='craft'?'craft':'grow';
  const bdgLabel=!s.unlocked?'ล็อค':s.type==='craft'?'คราฟ':'เติบโต';
  const waveColors=['','#5a8b3a','#3a6a8b','#7a5a20','#6a3a8b','#8b4a2a','#3a6a5a','#6a2a6a','#4a2a7a','#2a2a7a'];
  const wc=waveColors[s.wave]||'#555';

  const head=`<div class="card-head" style="border-left:3px solid ${s.accent}">
    <div class="card-emoji">${s.emoji}</div>
    <div class="card-info">
      <div class="card-name" title="${s.name}">${s.name}</div>
      <div class="card-meta">
        <span class="badge badge-${bdgType}">${bdgLabel}</span>
        <span class="wave-tag" style="color:${wc};border-color:${wc}">W${s.wave}</span>
      </div>
    </div>
  </div>`;

  let body='<div class="card-body">';

  if(s.type==='passive'){
    body+=`<div class="item-row">${s.produces.map(i=>`<div class="item-tag">${ITEMS[i]||'?'} ${i}</div>`).join('')}</div>`;
    if(!s.unlocked){
      const pOk=prereqMet(s);
      const prev=prereqStage(s);
      if(!pOk){
        body+=`<div class="cost-box" style="border-color:#5a2a2a"><div class="cost-title" style="color:var(--red)">🔒 ต้องปลดล็อคก่อน:</div><div class="cost-tags"><span class="ct bad">${prev?.emoji||''} ${prev?.name||''}</span></div></div>`;
        body+=`<button class="btn btn-unlock" disabled>🔒 ปลดล็อค ${prev?.name||''} ก่อน</button>`;
      } else {
        body+=costHTML(s.unlockCost,s.moneyCost);
        const itemOk=has(s.unlockCost);
        const moneyOk=!s.moneyCost||G.money>=s.moneyCost;
        const ok=itemOk&&moneyOk;
        body+=`<button class="btn btn-unlock" ${ok?'':'disabled'} onclick="unlock('${s.id}')">
          ${ok?'✨ ปลดล็อค':!moneyOk?'🔒 เงินไม่พอ':'🔒 ของยังไม่พอ'}</button>`;
      }
    } else {
      const partial=G.time/100;
      let pct=0;
      if(s.ready)pct=100;
      else if(s.planted)pct=Math.min(99,((s.daysGrown+partial)/s.growDays)*100);
      const stxt=s.ready?'🌟 พร้อมเก็บ!':s.planted?`โต ${s.daysGrown}/${s.growDays} วัน`:'รอปลูก';
      body+=`<div class="prog-wrap">
        <div class="prog-lbl"><span>${stxt}</span><span>${Math.round(pct)}%</span></div>
        <div class="prog-bar"><div class="prog-fill${s.ready?' gold':''}" style="width:${pct}%"></div></div>
      </div>`;
      if(s.ready) body+=`<button class="btn btn-harvest" onclick="harvest('${s.id}')">🌟 เก็บเกี่ยว! ×${s.amount}</button>`;
      else if(s.planted) body+=`<button class="btn btn-wait">⏳ กำลังโต...</button>`;
      else body+=`<button class="btn btn-plant" onclick="plant('${s.id}')">🌱 เริ่มปลูก</button>`;
      body+=`<label style="display:flex;align-items:center;gap:5px;margin-top:5px;font-size:11px;color:${s.autoPlant?'var(--green)':'var(--dim)'};cursor:pointer;user-select:none">
        <input type="checkbox" ${s.autoPlant?'checked':''} onchange="toggleAutoPlant('${s.id}')" style="accent-color:var(--green);cursor:pointer">
        🌱 ปลูกอัตโนมัติ</label>`;
    }
  }

  if(s.type==='craft'){
    if(!s.unlocked){
      const pOk=prereqMet(s);
      const prev=prereqStage(s);
      if(!pOk){
        body+=`<div class="cost-box" style="border-color:#5a2a2a"><div class="cost-title" style="color:var(--red)">🔒 ต้องปลดล็อคก่อน:</div><div class="cost-tags"><span class="ct bad">${prev?.emoji||''} ${prev?.name||''}</span></div></div>`;
        body+=`<button class="btn btn-unlock" disabled>🔒 ปลดล็อค ${prev?.name||''} ก่อน</button>`;
      } else {
        body+=costHTML(s.unlockCost,s.moneyCost);
        const itemOk=has(s.unlockCost);
        const moneyOk=!s.moneyCost||G.money>=s.moneyCost;
        const ok=itemOk&&moneyOk;
        body+=`<button class="btn btn-unlock" ${ok?'':'disabled'} onclick="unlock('${s.id}')">
          ${ok?'✨ ปลดล็อค':!moneyOk?'🔒 เงินไม่พอ':'🔒 ของยังไม่พอ'}</button>`;
      }
    } else {
      body+='<div class="recipes">'; // craft unlocked recipes
      s.recipes.forEach((r,i)=>{
        const can=has(r.ing);
        const ings=Object.entries(r.ing).map(([k,v])=>{
          const ok=(G.inv[k]||0)>=v;
          return`<span class="ri ${ok?'ok':'bad'}">${ITEMS[k]||''}${k}×${v}</span>`;
        }).join('');
        body+=`<div class="rrow">
          <div class="r-ico">${r.emoji}</div>
          <div class="r-name">${r.name}</div>
          <div class="r-ings">${ings}</div>
          <button class="btn-craft" ${can?'':'disabled'} onclick="craft('${s.id}',${i})">คราฟ</button>
        </div>`;
      });
      body+='</div>';
    }
  }

  body+='</div>';
  return`<div class="${cls}">${head}${body}</div>`;
}

function renderLog(){
  const el=document.getElementById('logList');if(!el||!G.log.length)return;
  el.innerHTML=G.log.slice(0,20).map(e=>
    `<div class="log-row t-${e.type||''}">
      <span class="log-day">Day ${e.day}</span>
      <span class="log-msg">${e.msg}</span>
    </div>`
  ).join('');
}

addLog('🌸 ECO Demo 50 ด่าน เริ่มแล้ว! กด 🌱 ที่ฟาร์ม A ก่อนเลย');
render();
requestAnimationFrame(loop);
</script>
